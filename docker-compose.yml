services:
  db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: boolder
      POSTGRES_PASSWORD: boolder
      POSTGRES_DB: dump-prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boolder -d dump-prod"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "3000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: db
      POSTGRES_PASSWORD: boolder
      SOLID_QUEUE_IN_PUMA: true
      RAILS_LOG_LEVEL: debug
      DISABLE_SSL: "true"
      ASSET_HOST: "localhost:3000"


volumes:
  pgdata:
